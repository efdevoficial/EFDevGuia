<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Entrar | EFDev</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/auth.css">
    <link rel="stylesheet" href="./css/toast.css">
    <link rel="shortcut icon" href="assets/logos/Logo EFDev.png" type="image/x-icon">


    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

    <main class="auth-container">

        <!-- Lado Esquerdo -->

        <section class="auth-left">

            <div class="overlay"></div>

            <div class="left-content">

                <a href="index.html" class="logo">

                    <div class="logo">

                        <img src="assets/logos/Logo EFDev.png" alt="EFDev">

                    </div>

                </a>

                <h1>

                    Bem-vindo de volta!

                </h1>

                <p>

                    Continue sua jornada pelo roadmap da programação,
                    acompanhe sua evolução e desbloqueie novos níveis.

                </p>

                <div class="features">

                    <div class="feature">

                        <i class="fa-solid fa-road"></i>

                        <span>Roadmap Inteligente</span>

                    </div>

                    <div class="feature">

                        <i class="fa-solid fa-medal"></i>

                        <span>Sistema de XP</span>

                    </div>

                    <div class="feature">

                        <i class="fa-solid fa-graduation-cap"></i>

                        <span>Instituições Recomendadas</span>

                    </div>

                    <div class="feature">

                        <i class="fa-solid fa-circle-check"></i>

                        <span>Quizzes de Progressão</span>

                    </div>

                </div>

            </div>

        </section>

        <!-- Lado Direito -->

        <section class="auth-right">

            <div class="login-card">

                <h2>Entrar</h2>

                <p>

                    Faça login para continuar.

                </p>

                <form id="loginForm">

                    <div class="input-group">

                        <label>Email</label>

                        <div class="input-box">

                            <i class="fa-solid fa-envelope"></i>

                            <input type="email" id="email" placeholder="Digite seu email" required>

                        </div>

                    </div>

                    <div class="input-group">

                        <label>Senha</label>

                        <div class="input-box">

                            <i class="fa-solid fa-lock"></i>

                            <input type="password" id="password" placeholder="Digite sua senha" required>

                            <button type="button" id="showPassword">

                                <i class="fa-solid fa-eye"></i>

                            </button>

                        </div>

                    </div>

                    <div class="remember">

                        <label>

                            <input type="checkbox">

                            Lembrar-me

                        </label>

                        <a href="#">

                            Esqueci minha senha

                        </a>

                    </div>

                    <button class="btn-primary login-btn" type="submit">

                        Entrar

                    </button>

                </form>

                <div class="divider">

                    <span>ou</span>

                </div>

                <a href="cadastro.html" class="register-link">

                    Criar uma conta

                </a>

            </div>

        </section>

    </main>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/toast.js"></script>
</body>

</html>
