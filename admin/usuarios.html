<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários | EFDev Admin</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/usuarios.css">
</head>
<body>

    <main class="dashboard-layout">

        <aside class="sidebar">
            <div class="sidebar-logo">
                <span>EF</span>Admin
            </div>

            <nav class="sidebar-menu">
                <a href="dashboard.html">📊 Dashboard</a>
                <a href="usuarios.html" class="active">👥 Usuários</a>
                <a href="roadmap.html">🗺 Roadmap</a>
                <a href="quizzes.html">❓ Quizzes</a>
                <a href="instituicoes.html">🎓 Instituições</a>
                <a href="ferramentas.html">🛠 Ferramentas</a>
                <a href="conquistas.html">🏆 Conquistas</a>
            </nav>
        </aside>

        <section class="dashboard-content">

            <header class="dashboard-header">
                <div>
                    <h1>👥 Gerenciar Usuários</h1>
                    <p>Visualize, edite, promova ou exclua usuários da plataforma.</p>
                </div>
            </header>

            <section class="stats-grid">
                <article class="stat-card">
                    <span>Total de Usuários</span>
                    <h2 id="totalUsers">0</h2>
                </article>

                <article class="stat-card">
                    <span>Administradores</span>
                    <h2 id="totalAdmins">0</h2>
                </article>

                <article class="stat-card">
                    <span>XP Médio</span>
                    <h2 id="averageXP">0</h2>
                </article>
            </section>

            <section class="users-panel">
                <div class="users-toolbar">
                    <input type="text" id="searchUser" placeholder="Pesquisar por nome ou email...">
                </div>

                <div class="users-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Usuário</th>
                                <th>Email</th>
                                <th>Cargo</th>
                                <th>XP</th>
                                <th>Nível</th>
                                <th>Ações</th>
                            </tr>
                        </thead>

                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
            </section>

        </section>

    </main>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2>Editar Usuário</h2>

            <form id="editUserForm">
                <input type="hidden" id="editUserId">

                <label>Nome</label>
                <input type="text" id="editName">

                <label>Email</label>
                <input type="email" id="editEmail">

                <label>Cargo</label>
                <select id="editRole">
                    <option value="user">Usuário</option>
                    <option value="admin">Administrador</option>
                </select>

                <label>XP</label>
                <input type="number" id="editXP">

                <label>Nível</label>
                <input type="number" id="editLevel">

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="closeModal">
                        Cancelar
                    </button>

                    <button type="submit" class="btn-primary">
                        Salvar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="js/usuarios.js"></script>

</body>
</html>
