<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações | EFDev</title>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/configuracoes.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="shortcut icon" href="assets/logos/Logo EFDev.png" type="image/x-icon">

</head>

<body>

    <main class="dashboard-layout">

        <aside class="sidebar">
            <div class="sidebar-logo">

                <img src="assets/logos/Logo EFDev.png" alt="EFDev">

            </div>

            <nav class="sidebar-menu">
                <a href="dashboard.html" class="active">🏠 Dashboard</a>
                <a href="perfil.html">👤 Perfil</a>
                <a href="conquistas.html">🏆 Conquistas</a>
                <a href="instituicoes.html">🎓 Instituições</a>
                <a href="ferramentas.html">🛠 Ferramentas</a>
                <a href="sobre.html">ℹ️ Sobre</a>
                <a href="configuracoes.html">⚙️ Configurações</a>
            </nav>
        </aside>

        <section class="dashboard-content">

            <header class="dashboard-header">
                <div>
                    <h1>⚙️ Configurações</h1>
                    <p>Gerencie suas informações e preferências.</p>
                </div>
            </header>

            <section class="settings-grid">

                <article class="settings-card">
                    <h2>Editar Perfil</h2>

                    <form id="settingsForm">
                        <label>Nome</label>
                        <input type="text" id="name">

                        <label>Email</label>
                        <input type="email" id="email">

                        <label>Área de interesse</label>
                        <select id="interest">
                            <option value="web">Desenvolvimento Web</option>
                            <option value="frontend">Front-end</option>
                            <option value="backend">Back-end</option>
                            <option value="mobile">Mobile</option>
                            <option value="dados">Banco de Dados</option>
                            <option value="ia">Inteligência Artificial</option>
                        </select>

                        <button type="submit" class="btn-primary">
                            Salvar Alterações
                        </button>
                    </form>
                </article>

                <article class="settings-card">
                    <h2>Conta</h2>

                    <p>
                        Você pode sair da sua conta atual e retornar para a tela de login.
                    </p>

                    <button id="logoutBtn" class="danger-btn">
                        Sair da Conta
                    </button>
                </article>

            </section>

        </section>

    </main>

    <script src="js/storage.js"></script>
    <script src="js/configuracoes.js"></script>
    <script src="js/toast.js"></script>
</body>

</html>
